name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Site
        run: |
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Install latest ossutil
        run: |
          curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Sync to OSS
        run: |
          # 显式使用 -i 和 -k 参数传递密钥，避免环境变量不生效的问题
          # 华北2 (北京) 的 endpoint 为 oss-cn-beijing.aliyuncs.com
          ossutil sync _site/ oss://${{ secrets.OSS_BUCKET }}/ \
            -e oss-cn-beijing.aliyuncs.com \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --delete \
            --force
