name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Site
        run: |
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Install latest ossutil
        run: |
          curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Sync to OSS
        env:
          # ossutil v2 会自动识别这些环境变量名
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          # 华北2 (北京) 的 endpoint 为 oss-cn-beijing.aliyuncs.com
          # --delete 确保 OSS 与本地 _site 目录同步镜像
          ossutil sync _site/ oss://${{ secrets.OSS_BUCKET }}/ -e oss-cn-beijing.aliyuncs.com --delete --force
